{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Papelería Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #003366 0%, #004d99 100%);">
    <div class="table-container" style="max-width: 400px; background: white;">
        <div style="padding: 40px; text-align: center;">
            <h1 style="color: #003366; margin-bottom: 10px; font-size: 2rem;">
                <i class="fas fa-pen-fancy"></i> Papelería Central
            </h1>
            <p style="color: #666; margin-bottom: 30px;">Sistema de Gestión de Inventario</p>
            {% if messages %}
            <div id="modalError" class="modal-venta">
                <div class="modal-contenido">

                    <i class="fas fa-exclamation-circle"
                    style="color:#dc3545;"></i>

                    <h2>Error de acceso</h2>

                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}

                    <button class="btn btn-danger"
                            onclick="cerrarModalError()">
                        Entendido
                    </button>

                </div>
            </div>
            {% endif %}
            

            <form method="POST">
                {% csrf_token %}
                
                <div style="margin-bottom: 15px; text-align: left;">
                    <label for="username" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        Usuario
                    </label>
                    <input type="text" id="username" name="username" required
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>

                <div style="margin-bottom: 20px; text-align: left;">
                    <label for="password" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        Contraseña
                    </label>
                    <input type="password" id="password" name="password" required
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>

                <button type="submit" class="btn btn-new" style="width: 100%; justify-content: center; padding: 12px;">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            <p style="color: #666; margin: 20px 0 0; font-size: .9rem;">
                Los usuarios se crean desde el sistema por un administrador.
            </p>
        </div>
    </div>
</div>

</body>
</html>

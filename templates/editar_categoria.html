{% extends 'base.html' %}
{% block title %}Editar categoría - Papelería Central{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-folder"></i> Editar categoría</h1>
    <a href="{% url 'store:categorias' %}" class="btn btn-secondary">Volver</a>
</div>
<div class="table-container" style="max-width: 700px;">
    <form method="POST" enctype="multipart/form-data" style="padding: 20px;">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Nombre *</label>
            <input type="text" name="nombre" value="{{ categoria.nombre }}" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Descripción</label>
            <textarea name="descripcion" rows="4" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">{{ categoria.descripcion }}</textarea>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Color</label>
            <input type="color" name="color_hex" value="{{ categoria.color_hex|default:'#003366' }}" style="width:100%; height:42px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Imagen</label>
            <input type="file" name="imagen" accept="image/*" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
        </div>
        <button type="submit" class="btn btn-new"><i class="fas fa-save"></i> Guardar cambios</button>
    </form>
</div>
{% endblock %}

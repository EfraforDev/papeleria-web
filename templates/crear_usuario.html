{% extends 'base.html' %}
{% block title %}Crear usuario - Papelería Central{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="fas fa-user-plus"></i> Crear usuario</h1>
    <a href="{% url 'store:usuarios' %}" class="btn btn-secondary">Volver</a>
</div>

{% if messages %}
    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
{% endif %}

<div class="table-container" style="max-width: 700px;">
    <form method="POST" style="padding: 20px;">
        {% csrf_token %}
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div>
                <label>Usuario *</label>
                <input type="text" name="username" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
            <div>
                <label>Correo</label>
                <input type="email" name="email" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
            <div>
                <label>Nombre</label>
                <input type="text" name="first_name" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
            <div>
                <label>Apellido</label>
                <input type="text" name="last_name" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
            <div>
                <label>Rol</label>
                <select name="rol" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
                    <option value="vendedor">Vendedor</option>
                    <option value="almacenero">Almacenero</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>
            <div></div>
            <div>
                <label>Contraseña *</label>
                <input type="password" name="password" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
            <div>
                <label>Confirmar contraseña *</label>
                <input type="password" name="password_confirm" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:5px;">
            </div>
        </div>
        <button type="submit" class="btn btn-new" style="margin-top:20px;"><i class="fas fa-save"></i> Guardar usuario</button>
    </form>
</div>
{% endblock %}

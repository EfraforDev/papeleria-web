{% extends 'base.html' %}
{% load static %}

{% block title %}Crear Categoría - Papelería Central{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-plus-circle"></i> Nueva Categoría</h1>
</div>

<div class="table-container" style="max-width: 500px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="padding: 30px;">
            <div style="margin-bottom: 20px;">
                <label for="nombre" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    Nombre de la Categoría *
                </label>
                <input type="text" id="nombre" name="nombre" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="descripcion" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    Descripción
                </label>
                <textarea id="descripcion" name="descripcion" rows="4"
                          style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="color_hex" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    Color de Tema
                </label>
                <input type="color" id="color_hex" name="color_hex" value="#003366" 
                       style="width: 100%; height: 50px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="imagen" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    Imagen de la Categoría
                </label>
                <input type="file" id="imagen" name="imagen" accept="image/*"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-new">
                    <i class="fas fa-save"></i> Guardar Categoría
                </button>
                <a href="{% url 'store:categorias' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %}Editar Producto - Papelería Central{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-edit"></i> Editar Producto</h1>
</div>

<div class="table-container" style="max-width: 700px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="padding: 30px;">
            <div style="margin-bottom: 20px;">
                <label for="nombre" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    <i class="fas fa-tag"></i> Nombre del Producto *
                </label>
                <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="sku" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    <i class="fas fa-barcode"></i> SKU (Código Único) *
                </label>
                <input type="text" id="sku" name="sku" value="{{ producto.sku }}" required 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="descripcion" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    <i class="fas fa-align-left"></i> Descripción
                </label>
                <textarea id="descripcion" name="descripcion" rows="4"
                          style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">{{ producto.descripcion }}</textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label for="precio_costo" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        <i class="fas fa-dollar-sign"></i> Precio Costo *
                    </label>
                    <input type="number" id="precio_costo" name="precio_costo" step="0.01" value="{{ producto.precio_costo }}" required 
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>

                <div>
                    <label for="precio_venta" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        <i class="fas fa-tag"></i> Precio Venta *
                    </label>
                    <input type="number" id="precio_venta" name="precio_venta" step="0.01" value="{{ producto.precio_venta }}" required 
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label for="categoria" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        <i class="fas fa-folder"></i> Categoría *
                    </label>
                    <select id="categoria" name="categoria" required 
                            style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                        {% for cat in categorias %}
                        <option value="{{ cat.id }}" {% if cat.id == producto.categoria.id %}selected{% endif %}>{{ cat.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="stock" style="display: block; font-weight: 600; margin-bottom: 5px;">
                        <i class="fas fa-boxes"></i> Stock Actual
                    </label>
                    <input type="number" id="stock" name="stock" value="{{ producto.stock }}" min="0" class="form-control"
                           style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #f5f5f5;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="stock_minimo" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    <i class="fas fa-exclamation-triangle"></i> Stock Mínimo (alerta)
                </label>
                <input type="number" id="stock_minimo" name="stock_minimo" value="{{ producto.stock_minimo }}" 
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 20px;">
                <label for="imagen" style="display: block; font-weight: 600; margin-bottom: 5px;">
                    <i class="fas fa-image"></i> Imagen del Producto
                </label>
                {% if producto.imagen %}
                <div style="margin-bottom: 10px;">
                    <img src="{{ producto.imagen.url }}" style="max-width: 200px; border-radius: 5px;">
                </div>
                {% endif %}
                <input type="file" id="imagen" name="imagen" accept="image/*"
                       style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-new">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                <a href="{% url 'store:inventario' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
